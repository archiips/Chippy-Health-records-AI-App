services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      # Persist local Chroma DB across container restarts (dev only)
      - ./chroma_db:/app/chroma_db
    depends_on:
      qdrant:
        condition: service_started
    profiles:
      - full   # run with: docker compose --profile full up

  api-dev:
    # Lightweight dev target — no Qdrant dependency
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./chroma_db:/app/chroma_db
      - .:/app   # live reload: mount source for uvicorn --reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    # Default profile — runs with just: docker compose up

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    profiles:
      - full   # only starts when --profile full is passed

volumes:
  qdrant_data:
